[invoke.reya_global_collateral_config]
target = ["CoreProxy"]
fromCall.func = "owner"
func = "setGlobalCollateralConfig"
args = [
    "<%= settings.reyaProxy %>",
    { collateralAdapter_DEPRECATED = "<%= settings.reyaCollateralAdapter %>", withdrawalWindowSize = "<%= settings.reyaWithdrawalWindowSize %>", withdrawalTvlPercentageLimit = "<%= parseEther(settings.reyaWithdrawalTvlPercentageLimitUnscaled)  %>" },
]
depends = [
    'invoke.upgrade_core_proxy',
    'var.external_contracts',
    'var.global_collateral_configs',
]

[invoke.reya_rusd_create_spot_market]
target = ["CoreProxy"]
abi = "<%= JSON.stringify(contracts.CoreProxy.abi.concat({'type':'event','name':'SpotMarketInfoUpdated','inputs':[{'name':'eventSequenceNumber','type':'uint128','indexed':true,'internalType':'uint128'},{'name':'spotMarketId','type':'uint128','indexed':true,'internalType':'uint128'},{'name':'baseToken','type':'address','indexed':false,'internalType':'address'},{'name':'quoteToken','type':'address','indexed':false,'internalType':'address'},{'name':'symbol','type':'string','indexed':false,'internalType':'string'},{'name':'config','type':'tuple','indexed':false,'internalType':'struct SpotMarketConfig','components':[{'name':'oracleDeviation','type':'uint256','internalType':'UD60x18'},{'name':'minimumOrderBase','type':'uint256','internalType':'UD60x18'},{'name':'baseSpacing','type':'uint256','internalType':'UD60x18'},{'name':'priceSpacing','type':'uint256','internalType':'UD60x18'},{'name':'oracleNodeId','type':'bytes32','internalType':'bytes32'}]},{'name':'blockTimestamp','type':'uint256','indexed':false,'internalType':'uint256'}],'anonymous':false})) %>"
fromCall.func = "owner"
func = "createSpotMarket"
args = [
    "<%= settings.reyaProxy%>",
    "<%= contracts.RUSDProxy.address %>",
    "REYARUSD",
]
var.reyaRusdSpotMarketId.event = "SpotMarketInfoUpdated"
var.reyaRusdSpotMarketId.arg = 1
depends = ["invoke.upgrade_core_proxy"]

[invoke.reya_rusd_configure_spot_market]
target = ["CoreProxy"]
fromCall.func = "owner"
func = "setSpotMarketConfiguration"
args = [
    "<%= settings.reyaRusdSpotMarketId %>",
    { oracleDeviation = "<%= parseEther(settings.reyaRusdSpot_oracleDeviationUnscaled) %>", minimumOrderBase = "<%= parseEther(settings.reyaRusdSpot_minimumOrderBaseUnscaled) %>", baseSpacing = "<%= parseEther(settings.reyaRusdSpot_baseSpacingUnscaled) %>", priceSpacing = "<%= parseEther(settings.reyaRusdSpot_priceSpacingUnscaled) %>", oracleNodeId = "<%= settings.reyaRusdSpot_oracleNodeId %>" },
]
depends = ["invoke.upgrade_core_proxy", "invoke.reya_rusd_create_spot_market"]

[invoke.reya_rusd_enable_spot_market]
target = ["CoreProxy"]
fromCall.func = "owner"
func = "setFeatureFlagAllowAll"
args = [
    "<%= keccak256(defaultAbiCoder.encode(['bytes32','uint128'],[keccak256(hexlify('spotMarketEnabled')), settings.reyaRusdSpotMarketId])) %>",
    true,
]
depends = ["invoke.upgrade_core_proxy", "invoke.reya_rusd_configure_spot_market"]