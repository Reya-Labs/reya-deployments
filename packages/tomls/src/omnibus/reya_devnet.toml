###############################################################################
# Reya Devnet Omnibus
#
# Minimal environment for perp orderbook (perpOB) release testing.
# Shares the Cronos testnet chain (chainId 89346162) and reuses existing
# Cronos deployments for tokens, rUSD, passive pool, periphery, oracle
# manager, exchange pass, oracle adapters, ranks, and SBT.
#
# Only deploys fresh proxies for: Core, PassivePerp, OrdersGateway.
#
# Markets: 1 perp (ETH), 1 spot (WETH/rUSD)
# Collaterals: rUSD, wETH
###############################################################################

include = [
    "utils/commons.toml",
    "utils/constants.toml",
    "../core/devnet.toml",
    "../passive_perp/devnet.toml",
    "../orders_gateway/devnet.toml",
    "../collateral_pools/collateral_pool_1/devnet.toml",
]

version = "1.0.0"

###############################################################################
# Existing Cronos Contract Addresses (reused, not redeployed)
###############################################################################
[var.existing_cronos_contracts]
rusdProxyAddress = "0x9DE724e7b3facF87Ce39465D3D712717182e3e55"
usdcProxyAddress = "0xfA27c7c6051344263533cc365274d9569b0272A8"
wethProxyAddress = "0x2CF56315ACC7E791B1A0135c09d8D5C8dBCD2F14"
passivePoolProxyAddress = "0x9A3A664987b88790A6FDC1632e3b607813fd94fF"
oracleManagerProxyAddress = "0x689f13829e9b218841a0Cf59f44bD5c92F0d64eA"
peripheryProxyAddress = "0x94ccAe812f1647696754412082dd6684C2366A7f"
oracleAdaptersProxyAddress = "0xc501A2356703CD351703D68963c6F4136120f7CF"
exchangePassProxyAddress = "0x1Acd15A57Aff698440262A2A13AE22F8Ff2FA0cB"
accountNftProxyAddress = "0xeA13E7dA71E018160019A296Eca4184Ddc53aeB1"
# Existing Cronos passive pool ID and account ID
existingPool1RusdId = "1"
existingPool1RusdAccountId = "2"

###############################################################################
# Wallet Addresses (simplified - single owner for devnet)
###############################################################################
[var.wallet_addresses]
owner = "0xaE173a960084903b1d278Ff9E3A81DeD82275556"
passivePoolExchangeFeeCollectorOwner = "0xaE173a960084903b1d278Ff9E3A81DeD82275556"

###############################################################################
# External Contracts
###############################################################################
[var.external_contracts]
camelotYakRouter = "<%= AddressZero %>"

###############################################################################
# Cannon Clone Packages (only the 3 we deploy fresh)
###############################################################################
[var.cannonClonePackages]
coreProxyPackage = "reya-core:1.0.0@proxy"
coreRouterPackage = "reya-core:1.0.27@router"
coreAccountNftRouterPackage = "reya-core:1.0.2@account-nft-router"
passivePerpProxyPackage = "reya-instrument-passive-perp:1.0.0@proxy"
passivePerpRouterPackage = "reya-instrument-passive-perp:1.0.50@router"
ordersGatewayProxyPackage = "reya-orders-gateway:1.0.1@proxy"
ordersGatewayRouterPackage = "reya-orders-gateway:1.0.20@router"

###############################################################################
# Account NFT
###############################################################################
[var.account_nft_vars]
accountNftId = "<%= formatBytes32String('accountNFT') %>"
accountNftName = "Reya Account NFT"
accountNftSymbol = "REYA"
accountNftUri = "https://reya.xyz/"

###############################################################################
# Compatibility Aliases (match var names expected by existing config files)
###############################################################################
[var.cronos_compat_vars]
passivePoolProxy = "0x9A3A664987b88790A6FDC1632e3b607813fd94fF"
oracleManagerProxy = "0x689f13829e9b218841a0Cf59f44bD5c92F0d64eA"
pool1RusdId = "1"
pool1RusdAccountId = "2"
pool1RusdRebateUnscaled = "0"

###############################################################################
# Initial Proxy Salts (devnet-specific to avoid collision with Cronos)
###############################################################################
[var.initial_proxy_vars]
coreSalt = "core-devnet"
passivePerpSalt = "passive-perp-devnet"
ordersGatewaySalt = "orders-gateway-devnet"

[var.missing_vars]
salt = ""

###############################################################################
# Proxy Upgrade Variables (only the 3 fresh proxies)
###############################################################################
[var.upgrade_proxy_vars]
coreProxy = "<%= imports.reyaCoreProxy.contracts.InitialProxy.address %>"
passivePerpProxy = "<%= imports.reyaPassivePerpProxy.contracts.InitialProxy.address %>"
ordersGatewayProxy = "<%= imports.reyaOrdersGatewayProxy.contracts.InitialProxy.address %>"
depends = [
    "clone.reyaCoreProxy",
    "clone.reyaPassivePerpProxy",
    "clone.reyaOrdersGatewayProxy",
]

###############################################################################
# Pausers (simplified: single pauser for devnet)
###############################################################################
[var.pausers]
pauser1 = "0xaE173a960084903b1d278Ff9E3A81DeD82275556"
pauser2 = "0xaE173a960084903b1d278Ff9E3A81DeD82275556"
