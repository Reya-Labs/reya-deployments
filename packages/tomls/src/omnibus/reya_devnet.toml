###############################################################################
# Reya Devnet Omnibus
#
# Minimal environment for perp orderbook (perpOB) release testing.
# Shares the Cronos testnet chain (chainId 89346162) and reuses existing
# Cronos token deployments. Deploys fresh proxies for core system contracts.
#
# Markets: 1 perp (ETH), 1 spot (WETH/rUSD)
# Collaterals: rUSD, wETH
###############################################################################

include = [
    "utils/commons.toml",
    "utils/constants.toml",
    "../token/devnet.toml",
    "../rusd/testnet.toml",
    "../core/devnet.toml",
    "../passive_pool/testnet.toml",
    "../passive_perp/devnet.toml",
    "../periphery/testnet.toml",
    "../oracle_manager/testnet.toml",
    "../exchange_pass_nft/testnet.toml",
    "../ranks/testnet.toml",
    "../collateral_pools/collateral_pool_1/devnet.toml",
    "../orders_gateway/devnet.toml",
    "../oracle_adapters/testnet.toml",
    "../share_token/mainnet.toml",
    "../sbt/testnet.toml",
]

version = "1.0.0"

