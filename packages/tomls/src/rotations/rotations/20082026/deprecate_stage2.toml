# Stage 2: revoke permissions from the original wallets that were rotated to d18062026_*
# Run AFTER introduce.toml has executed successfully on-chain.

# -----------------------------------------------
# Revoke matchOrderPublisher from liquidator1, liquidator10
# -----------------------------------------------

[invoke.core_proxy_remove_access_liquidator1_matchOrderPublisher]
target = ["CoreProxy"]
fromCall.func = "owner"
func = "removeFromFeatureFlagAllowlist"
args = [
    "<%= keccak256(hexlify('matchOrderPublisher')) %>",
    "<%= settings.liquidator1 %>",
]
depends = ["invoke.upgrade_core_proxy"]

[invoke.core_proxy_remove_access_liquidator10_matchOrderPublisher]
target = ["CoreProxy"]
fromCall.func = "owner"
func = "removeFromFeatureFlagAllowlist"
args = [
    "<%= keccak256(hexlify('matchOrderPublisher')) %>",
    "<%= settings.liquidator10 %>",
]
depends = ["invoke.upgrade_core_proxy"]

# -----------------------------------------------
# Revoke AE liquidator permissions from d06082025_ae_liquidator1
# -----------------------------------------------

[invoke.core_proxy_remove_multicall_access_d06082025_ae_liquidator1]
target = ["CoreProxy"]
fromCall.func = "owner"
func = "removeFromFeatureFlagAllowlist"
args = [
    "<%= keccak256(hexlify('multicall')) %>",
    "<%= settings.d06082025_ae_liquidator1 %>",
]
depends = ["invoke.upgrade_core_proxy"]

[invoke.passive_pool_remove_staked_quote_auto_exchange_access_d06082025_ae_liquidator1]
target = ["PassivePoolProxy"]
fromCall.func = "owner"
func = "removeFromFeatureFlagAllowlist"
args = [
    "<%= keccak256(defaultAbiCoder.encode(['bytes32','uint128'],[keccak256(hexlify('stakedAssetAutoExchange')),settings.pool1RusdId])) %>",
    "<%= settings.d06082025_ae_liquidator1 %>",
]
depends = ["invoke.upgrade_passive_pool_proxy"]

[invoke.core_proxy_revoke_admin_permission_d06082025_ae_liquidator1]
target = ["CoreProxy"]
fromCall.func = "owner"
func = "revokeAccountPermission"
args = [
    "<%= settings.aeMarginAccountId1 %>",
    "<%= keccak256(hexlify('ADMIN')) %>",
    "<%= settings.d06082025_ae_liquidator1 %>",
]
depends = ["invoke.upgrade_core_proxy"]

