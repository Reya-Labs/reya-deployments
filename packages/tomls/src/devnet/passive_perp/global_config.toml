# Devnet passive perp global config: uses hardcoded Cronos PassivePool address
[invoke.passive_perp_global_config]
target = ["PassivePerpProxy"]
fromCall.func = "owner"
func = "setGlobalConfiguration"
args = [
    { coreProxy = "<%= contracts.CoreProxy.address %>", exchangeProxy_DEPRECATED = "<%= AddressZero %>", oracleManagerAddress = "<%= settings.oracleManagerProxyAddress %>", maxAbsFundingRate = "<%= parseEther(settings.maxAbsFundingRateUnscaled) %>", dustAccountId = "0" },
]
depends = ["invoke.upgrade_passive_perp_proxy"]
