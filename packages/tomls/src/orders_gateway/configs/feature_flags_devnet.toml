# Devnet orders gateway feature flags: unpause, co execution bot, matching engine publisher
[invoke.orders_gateway_unpause]
target = ["OrdersGatewayProxy"]
fromCall.func = "owner"
func = "setFeatureFlagAllowAll"
args = ["<%= keccak256(hexlify('global')) %>", true]
depends = ["invoke.upgrade_orders_gateway_proxy"]

[invoke.orders_gateway_set_pausers]
target = ["OrdersGatewayProxy"]
fromCall.func = "owner"
func = "setDeniers"
args = [
    "<%= keccak256(hexlify('global')) %>",
    [
        "<%= settings.pauser1 %>",
        "<%= settings.pauser2 %>",
        "<%= settings.pauser3 %>",
        "<%= settings.pauser4 %>",
    ],
]
depends = ["invoke.upgrade_orders_gateway_proxy"]

[invoke.orders_gateway_enable_execution_bot]
target = ["OrdersGatewayProxy"]
fromCall.func = "owner"
func = "addToFeatureFlagAllowlist"
args = [
    "<%= keccak256(hexlify('conditional_orders')) %>",
    "<%= settings.co_execution_bot1 %>",
]
depends = ["invoke.upgrade_orders_gateway_proxy"]

[invoke.orders_gateway_enable_matching_engine_publisher_1]
target = ["OrdersGatewayProxy"]
fromCall.func = "owner"
func = "addToFeatureFlagAllowlist"
args = [
    "<%= keccak256(hexlify('matching_engine_publisher')) %>",
    "<%= settings.matching_engine_publisher1 %>",
]
depends = ["invoke.upgrade_orders_gateway_proxy"]
